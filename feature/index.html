<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago Simple</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 50px; }
        
        .caja-pago { 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            width: 350px; 
            border: 1px solid #ccc;
        }

        .campo { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; /* Para que el padding no ensanche el input */
        }

        .fila { display: flex; gap: 10px; }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
        }

        button:hover { background: #218838; }
        
        .total { text-align: center; font-size: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="caja-pago">
    <div class="total">Total: <b>$35.00</b></div>

    <form>
        <div class="campo">
            <label>Nombre del titular</label>
            <input type="text" placeholder="Ej. Juan Pérez">
        </div>

        <div class="campo">
            <label>Número de tarjeta</label>
            <input type="text" placeholder="0000 0000 0000 0000">
        </div>

        <div class="fila">
            <div class="campo">
                <label>Expiración</label>
                <input type="text" placeholder="MM/AA">
            </div>
            <div class="campo">
                <label>CVC</label>
                <input type="text" placeholder="123">
            </div>
        </div>

        <button type="submit">Confirmar Pago</button>
    </form>
</div>

</body>
</html>
